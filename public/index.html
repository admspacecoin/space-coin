<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>SPACE COIN — Entrar</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
:root {
  --verde: #1a7a4a; --verde-escuro: #145c38; --verde-claro: #e8f5ee;
  --escuro: #1a1a2e; --escuro2: #2a2a42;
  --bg-page: #f2f3f5; --bg-card: #ffffff; --bg-input: #f2f3f5;
  --txt-1: #111111; --txt-2: #666666; --txt-3: #999999;
  --borda: rgba(0,0,0,0.09); --vermelho: #e53935;
  --r8: 8px; --r12: 12px; --r16: 16px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#dde0e5;display:flex;justify-content:center;align-items:flex-start;}
.device{width:390px;height:100dvh;min-height:600px;max-height:900px;background:var(--bg-page);display:flex;flex-direction:column;overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,.25);}
@media(max-width:420px){.device{width:100vw;max-height:100dvh;box-shadow:none;}}

.auth-hero{background:var(--escuro);padding:40px 24px 28px;display:flex;flex-direction:column;align-items:center;gap:10px;}
.auth-logo{width:64px;height:64px;background:rgba(255,255,255,.1);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:32px;}
.auth-title{font-size:24px;font-weight:800;color:#fff;letter-spacing:.5px;}
.auth-sub{font-size:13px;color:rgba(255,255,255,.55);text-align:center;}

.auth-body{flex:1;overflow-y:auto;padding:20px 20px 24px;}

.type-toggle{display:flex;background:#e0e0e0;border-radius:var(--r8);padding:3px;margin-bottom:18px;}
.type-btn{flex:1;padding:9px;text-align:center;font-size:13px;font-weight:600;border-radius:6px;cursor:pointer;color:#999;transition:all .2s;border:none;background:transparent;font-family:inherit;}
.type-btn.on{background:#fff;color:#111;box-shadow:0 1px 4px rgba(0,0,0,.1);}

form{display:flex;flex-direction:column;gap:12px;}
.flabel{font-size:10px;font-weight:700;color:var(--txt-3);text-transform:uppercase;letter-spacing:.35px;margin-bottom:4px;display:block;}
.fi{background:var(--bg-input);border:none;border-radius:var(--r8);padding:11px 13px;font-size:14px;color:var(--txt-1);outline:none;width:100%;font-family:inherit;transition:box-shadow .15s;-webkit-appearance:none;}
.fi:focus{box-shadow:0 0 0 2px rgba(26,122,74,.3);}
.fi::placeholder{color:#ccc;}

.btn-primary{background:var(--escuro);color:#fff;border:none;border-radius:var(--r12);padding:14px;width:100%;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:background .2s;margin-top:4px;}
.btn-primary:hover:not(:disabled){background:var(--escuro2);}
.btn-primary:disabled{opacity:.6;cursor:not-allowed;}

.auth-msg{font-size:12px;text-align:center;padding:8px;border-radius:var(--r8);margin-top:4px;min-height:16px;}
.auth-msg.error{background:#fdecea;color:var(--vermelho);}
.auth-msg.success{background:var(--verde-claro);color:var(--verde-escuro);}

.auth-footer{font-size:11px;color:var(--txt-3);text-align:center;padding:12px 0 0;}

@media(min-width:769px){
  html,body{align-items:center;justify-content:center;min-height:100vh;}
  .device{
    width:460px;
    height:auto;
    min-height:0;
    max-height:90vh;
    border-radius:16px;
    box-shadow:0 12px 48px rgba(0,0,0,.22);
    overflow:hidden;
  }
  .auth-hero{padding:36px 32px 28px;}
  .auth-body{padding:24px 32px 28px;}
}
</style>
</head>
<body>
<div class="device">

  <div class="auth-hero">
    <div class="auth-logo">🪙</div>
    <div class="auth-title">SPACE COIN</div>
    <div class="auth-sub">Catálogo inteligente de moedas e cédulas para colecionadores</div>
  </div>

  <div class="auth-body">
    <div class="type-toggle">
      <button class="type-btn on" id="tab-login"    onclick="showTab('login')"   >Entrar</button>
      <button class="type-btn"    id="tab-register" onclick="showTab('register')">Cadastrar</button>
    </div>

    <!-- FORM LOGIN -->
    <form id="form-login" onsubmit="login(event)" style="display:flex;flex-direction:column;gap:12px;">
      <div>
        <label class="flabel" for="login-email">E-mail</label>
        <input class="fi" id="login-email" type="email" placeholder="seu@email.com" autocomplete="email" required>
      </div>
      <div>
        <label class="flabel" for="login-password">Senha</label>
        <input class="fi" id="login-password" type="password" placeholder="••••••" autocomplete="current-password" required>
      </div>
      <button class="btn-primary" id="btn-login" type="submit" data-label="Entrar">Entrar</button>
    </form>

    <!-- FORM CADASTRO -->
    <form id="form-register" onsubmit="register(event)" style="display:none;flex-direction:column;gap:12px;">
      <div>
        <label class="flabel" for="reg-name">Nome</label>
        <input class="fi" id="reg-name" type="text" placeholder="Seu nome" autocomplete="name" required>
      </div>
      <div>
        <label class="flabel" for="reg-email">E-mail</label>
        <input class="fi" id="reg-email" type="email" placeholder="seu@email.com" autocomplete="email" required>
      </div>
      <div>
        <label class="flabel" for="reg-password">Senha (mín. 6 caracteres)</label>
        <input class="fi" id="reg-password" type="password" placeholder="••••••" autocomplete="new-password" required minlength="6">
      </div>
      <button class="btn-primary" id="btn-register" type="submit" data-label="Criar conta">Criar conta</button>
    </form>

    <div class="auth-msg" id="auth-msg"></div>

    <div class="auth-footer">
      Space Coin v1.0 · Gratuito para colecionadores
    </div>
  </div>

</div>

<script src="js/config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/auth.js"></script>
</body>
</html>
